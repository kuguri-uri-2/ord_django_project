{% extends 'primal/base.html' %}
{% block title %}my word cards{% endblock %}

{% block content %}

  <main class="mt-6 px-6 py-12 bg-orange-100 rounded-3xl">
  
    <header class="mb-12 text-center">
      <h2 class="text-2xl">my word cards</h2>
    </header>

    <section class="grid grid-cols-3 gap-3">
      {% for card in cards %}
        <article>
          <a href="{% url 'card:detail' card.id %}" class="block h-full">
            <div class="p-6 bg-white rounded-3xl">
              <h3 class="text-2xl">{{ card.name }}</h3>
              <p class="text-gray-500">translation: {{ card.translation }}</p>
            </div>
          </a>
        </article>
      {% endfor %}
    </section>
    
  </main>

{% endblock %}
