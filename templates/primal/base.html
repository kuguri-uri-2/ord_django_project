<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}{% endblock %} | ord</title>
</head>
<body class="font-mono min-h-screen flex flex-col">

    <header class="border-b border-gray-200 bg-lime-100">
        <div class="py-6 px-6 flex items-center justify-between">
            <a href="/" class="text-3xl font-semibold">ord</a>

            <nav class="flex items-center space-x-6">
                <a href="{% url 'card:new' %}" class="text-lg font-semibold hover:text-lime-500">
                    create a word card
                </a>
                <a href="{% url 'card:cards' %}" class="text-lg font-semibold hover:text-lime-500">
                    find a word card
                </a>

                {% if request.user.is_authenticated %}
                    <a href="{% url 'table:index' %}" 
                       class="px-6 py-3 text-lg font-semibold bg-lime-500 text-white rounded-3xl hover:bg-lime-700">
                        table
                    </a>
                {% else %}
                    <a href="{% url 'primal:signup' %}" 
                       class="px-6 py-3 text-lg font-semibold bg-lime-500 text-white rounded-3xl hover:bg-lime-700">
                        signup
                    </a>
                    <a href="{% url 'primal:login' %}" 
                       class="px-6 py-3 text-lg font-semibold bg-lime-500 text-white rounded-3xl hover:bg-lime-700">
                        login
                    </a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="flex-grow px-6 py-6 text-center">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-lime-100">
        <div class="py-6 px-6 flex justify-between items-start">
            <div class="w-2/3 pr-10">
                <h3 class="mb-5 text-xl font-semibold text-lime-400">about this awesome app</h3>
                <p class="text-lg text-lime-900">
                    create, edit and learn word cards on norwegian and rise above
                </p>
            </div>
        </div>
    </footer>

</body>
</html>
